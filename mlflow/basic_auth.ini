[mlflow]
# 명시적 권한이 없는 인증 사용자의 기본 권한.
# 멀티테넌트처럼 "부여한 프로젝트만 열람" 시키려면 NO_PERMISSIONS가 적절하다.
# (admin은 항상 전체 권한 보유)
default_permission = NO_PERMISSIONS

# 인증 정보(유저/권한)를 저장하는 DB. 컨테이너 볼륨에 영속화한다.
database_uri = sqlite:////mlflow-auth/basic_auth.db

# 최초 관리자 계정 (운영 시 반드시 변경할 것)
# 주의: MLflow 3.x는 비밀번호 12자 이상을 강제한다.
admin_username = admin
admin_password = adminpassword

authorization_function = mlflow.server.auth:authenticate_request_basic_auth
